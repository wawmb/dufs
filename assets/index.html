<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <link href="__ASSETS_PREFIX__favicon.ico" rel="icon" type="image/x-icon">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" name="viewport">
    <title>dufs</title>
    <script crossorigin src="__ASSETS_PREFIX__index.js" type="module"></script>
    <link href="__ASSETS_PREFIX__index.css" rel="stylesheet" crossorigin>
    <script defer src="__ASSETS_PREFIX__custom-settings.js"></script>
</head>

<body>
    <div id="app"></div>
    <script>
        window.__CUSTOM_DOCUMENT_TITLE__ = "Path of ${path} - Dustin's file share";
        window.__CUSTOM_PAGE_TITLE__ = "Dustin's file share";
        window.__CUSTOM_THEME__ = {
            light: {
                primary: '#0288d1',
                secondary: '#00b0ff',
            },
            dark: {
                primary: '#026da7',
                secondary: '#008dcc',
            },
        };
        window.__INITIAL_DATA__ = JSON.parse(decodeURIComponent(escape(atob("__INDEX_DATA__"))));
        window.__DUFS_INITIAL_DATA__ = window.__INITIAL_DATA__;
        window.__DUFS_ALLOW_UI_SETTINGS__ = Boolean(window.__INITIAL_DATA__.allow_ui_settings);
        window.__DUFS_PREFIX__ = "__ASSETS_PREFIX__";
        window.__CUSTOM_UI_SETTINGS_URL__ = "__UI_SETTINGS_ROUTE__";
        window.__CUSTOM_BACKGROUND_URL__ = `https://www.dmoe.cc/random.php?_dufs_bg=${Date.now()}_${Math.random().toString(36).slice(2)}`;
        document.head.insertAdjacentHTML(
            "beforeend",
            `<style>.v-application{background-image:url("${window.__CUSTOM_BACKGROUND_URL__}") !important;}</style>`
        );
    </script>
</body>

</html>
